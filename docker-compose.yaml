services:

  # ==========================================
  # ZOOKEEPER (required by DRUID for service
  # discovery -- Kafka does NOT use this)
  # Docker Official image (free, multi-arch)
  # ==========================================

  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
    networks:
      - druid-network

  # ==========================================
  # APACHE KAFKA (KRaft mode - no Zookeeper)
  # Official Apache image (ASL 2.0, free)
  # ==========================================

  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    ports:
      - "9092:9092"          # EXTERNAL listener for host clients (data generator)
    environment:
      # --- KRaft (combined broker + controller, single node) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Must be a 22-char base64-encoded UUID (generate your own: kafka-storage.sh random-uuid)
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

      # --- Listeners ---
      # INTERNAL  : Docker-network clients (Druid ingestion) -> kafka:29092
      # EXTERNAL  : host clients (Python generator)          -> localhost:9092
      # CONTROLLER: KRaft internal quorum traffic
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- Single-broker replication settings ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # --- Storage ---
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:29092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 15s
    networks:
      - druid-network

  kafka-init:
    image: apache/kafka:3.9.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      BIN=/opt/kafka/bin
      BOOTSTRAP=kafka:29092
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.inventory_events  --partitions 3 --replication-factor 1
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.shipment_events   --partitions 3 --replication-factor 1
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.production_events --partitions 2 --replication-factor 1
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.demand_events     --partitions 3 --replication-factor 1
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.supplier_events   --partitions 2 --replication-factor 1
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.iot_telemetry     --partitions 6 --replication-factor 1
      echo 'Kafka topics created successfully'
      "
    networks:
      - druid-network

  # ==========================================
  # APACHE DRUID METADATA (PostgreSQL)
  # ==========================================

  druid-metadata:
    image: postgres:15
    container_name: druid-metadata
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: druid
      POSTGRES_USER: druid
      POSTGRES_PASSWORD: druid
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - druid-network

  # ==========================================
  # APACHE DRUID CLUSTER
  # ==========================================

  druid-coordinator:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-coordinator
    volumes:
      - druid-shared:/opt/shared
    ports:
      - "8081:8081"
    command:
      - coordinator
    env_file:
      - ./environment
    depends_on:
      - druid-metadata
      - zookeeper
    networks:
      - druid-network

  druid-overlord:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-overlord
    ports:
      - "8093:8093"
    command:
      - overlord
    env_file:
      - ./environment
    depends_on:
      - druid-metadata
      - zookeeper
    networks:
      - druid-network

  druid-broker:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-broker
    ports:
      - "8082:8082"
    command:
      - broker
    env_file:
      - ./environment
    depends_on:
      - druid-coordinator
      - druid-overlord
    networks:
      - druid-network

  druid-historical:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-historical
    volumes:
      - druid-shared:/opt/shared
    ports:
      - "8083:8083"
    command:
      - historical
    env_file:
      - ./environment
    depends_on:
      - druid-coordinator
      - druid-overlord
    networks:
      - druid-network

  druid-middlemanager:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-middlemanager
    volumes:
      - druid-shared:/opt/shared
    ports:
      - "8091:8091"
    command:
      - middleManager
    env_file:
      - ./environment
    depends_on:
      - druid-coordinator
      - druid-overlord
    networks:
      - druid-network

  druid-router:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-router
    ports:
      - "8888:8888"
    command:
      - router
    env_file:
      - ./environment
    depends_on:
      - druid-coordinator
      - druid-overlord
      - druid-broker
    networks:
      - druid-network

# ==========================================
# NETWORKS AND VOLUMES
# ==========================================

networks:
  druid-network:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  druid-shared:
