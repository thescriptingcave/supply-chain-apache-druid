services:

  # ==========================================
  # ZOOKEEPER (still used by Druid only)
  # ==========================================
  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - druid-network

  # ==========================================
  # KAFKA (KRaft, dual listeners)
  #   INTERNAL  kafka:29092     -> containers (Druid, kafka-init)
  #   EXTERNAL  localhost:9092  -> host clients (data generator)
  # ==========================================
  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    ports:
      - "9092:9092"   # host -> EXTERNAL listener
    environment:

      # --- KRaft mode ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

      # --- Dual listeners ---
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- Single broker safety ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka-data:/var/lib/kafka/data

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:29092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 15s

    networks:
      - druid-network

  # ==========================================
  # KAFKA TOPIC INITIALIZER
  # ==========================================
  kafka-init:
    image: apache/kafka:3.9.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      BIN=/opt/kafka/bin
      BOOTSTRAP=kafka:29092

      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.inventory_events  --partitions 3 --replication-factor 1
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.shipment_events   --partitions 3 --replication-factor 1
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.production_events --partitions 2 --replication-factor 1
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.demand_events     --partitions 3 --replication-factor 1
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.supplier_events   --partitions 2 --replication-factor 1
      $$BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic supply_chain.iot_telemetry     --partitions 6 --replication-factor 1

      echo 'Kafka topics created successfully'
      "
    networks:
      - druid-network

  # ==========================================
  # POSTGRES (Druid metadata store)
  # ==========================================
  druid-metadata:
    image: postgres:15
    container_name: druid-metadata
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: druid
      POSTGRES_USER: druid
      POSTGRES_PASSWORD: druid
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - druid-network

  # ==========================================
  # DRUID CLUSTER
  #
  # NOTE: no separate overlord service. The apache/druid image's
  # `coordinator` command runs coordinator-as-overlord, so a
  # dedicated overlord container creates TWO overlords and split
  # leadership (tasks run but never appear in the console).
  #
  # /opt/shared is required by the `environment` file:
  #   druid_storage_storageDirectory=/opt/shared/segments
  #   druid_indexer_logs_directory=/opt/shared/indexing-logs
  # It must be the SAME volume on coordinator, historical, and
  # middleManager so segments written by tasks are visible to
  # the historical.
  # ==========================================
  druid-coordinator:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-coordinator
    command: coordinator
    env_file:
      - ./environment
    volumes:
      - druid-shared:/opt/shared
    depends_on:
      - druid-metadata
      - zookeeper
    networks:
      - druid-network

  druid-broker:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-broker
    ports:
      - "8082:8082"
    command: broker
    env_file:
      - ./environment
    depends_on:
      - druid-coordinator
    networks:
      - druid-network

  druid-historical:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-historical
    command: historical
    env_file:
      - ./environment
    volumes:
      - druid-shared:/opt/shared
    depends_on:
      - druid-coordinator
    networks:
      - druid-network

  druid-middlemanager:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-middlemanager
    command: middleManager
    env_file:
      - ./environment
    volumes:
      - druid-shared:/opt/shared
    depends_on:
      - druid-coordinator
    networks:
      - druid-network

  druid-router:
    image: apache/druid:29.0.0
    platform: linux/amd64
    container_name: druid-router
    ports:
      - "8888:8888"
    command: router
    env_file:
      - ./environment
    depends_on:
      - druid-broker
    networks:
      - druid-network

# ==========================================
  # SUPERSET (BI layer)
  #
  # Native arm64 image (runs unemulated on Apple Silicon).
  # pydruid is installed at build time -- it is the SQLAlchemy
  # driver Superset needs to talk to Druid SQL.
  # Superset's own metadata lives in a second database on the
  # existing Postgres container (create once:
  #   docker exec druid-metadata psql -U druid -c "CREATE DATABASE superset;")
  #
  # First-time init (run once after `docker compose up -d superset`):
  #   docker exec superset superset db upgrade
  #   docker exec superset superset fab create-admin \
  #     --username admin --firstname Admin --lastname User \
  #     --email admin@localhost --password admin
  #   docker exec superset superset init
  #
  # UI: http://localhost:8088  (admin/admin)
  # Druid connection URI (inside the UI, trailing slash required):
  #   druid://druid-broker:8082/druid/v2/sql/
  # ==========================================
  superset:
    build:
      context: .
      dockerfile_inline: |
        FROM apache/superset:4.1.1
        USER root
        RUN pip install --no-cache-dir pydruid psycopg2-binary
        USER superset
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "5O5qCa1wFbgrjuQZzuWB6lDDDcKcG-P6DNNW7O7SiY1gC4lrl0cP_aWi"
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://druid:druid@druid-metadata:5432/superset"
    volumes:
      - superset-data:/app/superset_home
    depends_on:
      - druid-metadata
      - druid-broker
    networks:
      - druid-network

# ==========================================
# NETWORKS + VOLUMES
# ==========================================
networks:
  druid-network:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  druid-shared:
  superset-data:
