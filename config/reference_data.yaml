  # Monthly demand multipliers (1.0 = average)
  monthly_multipliers:
    1: 0.85   # January - post-holiday dip
    2: 0.80   # February
    3: 0.95   # March
    4: 1.00   # April
    5: 1.05   # May
    6: 1.10   # June
    7: 0.95   # July
    8: 0.95   # August
    9: 1.05   # September
    10: 1.10  # October
    11: 1.30  # November - holiday prep
    12: 1.50  # December - peak

  # Day of week multipliers
  dow_multipliers:
    0: 0.70   # Sunday
    1: 1.10   # Monday
    2: 1.05   # Tuesday
    3: 1.00   # Wednesday
