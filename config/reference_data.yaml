    3: 0.02
    4: 0.02
    5: 0.05
    6: 0.15
    7: 0.35
    8: 0.60
    9: 0.85
    10: 1.00
    11: 1.05
    12: 0.90
    13: 0.95
    14: 1.00
    15: 1.05
    16: 1.10
    17: 1.00
    18: 0.85
    19: 0.75
    20: 0.65
    21: 0.55
    22: 0.40
    23: 0.25

